name: time-announcement-frontend
version: 1.0.0
description: タイムアナウンスメント再生プログラム(src/main.py)向けの schedules.json 編集フロントエンド
author: macha434
targets:
  - claude
dependencies:
  apm:
    - anthropics/claude-plugins-official/plugins/claude-md-management
    - anthropics/claude-plugins-official/plugins/feature-dev
    - anthropics/claude-plugins-official/plugins/pr-review-toolkit
    - anthropics/claude-plugins-official/plugins/commit-commands
    - anthropics/claude-plugins-official/plugins/hookify
    - anthropics/claude-plugins-official/plugins/security-guidance
    - anthropics/claude-plugins-official/plugins/frontend-design
    - vercel-labs/agent-skills/skills/react-best-practices
    - vercel-labs/agent-skills/skills/composition-patterns
    - vercel-labs/agent-skills/skills/web-design-guidelines
    - vercel/next.js/skills/next-dev-loop#canary
    - vercel/next.js/skills/next-cache-components-adoption#canary
    - vercel/next.js/skills/next-cache-components-optimizer#canary
    - obra/superpowers
  mcp:
    - name: playwright
      registry: false
      transport: stdio
      command: npx
      args:
        - '@playwright/mcp@latest'
    - name: next-devtools
      registry: false
      transport: stdio
      command: npx
      args:
        - -y
        - next-devtools-mcp@latest
includes: auto
scripts: {}
